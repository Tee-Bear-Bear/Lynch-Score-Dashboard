<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Lynch Hunter Pro</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #0b1421; color: #fff; margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 30px; }
    h1 { color: #facc15; font-size: 2.2em; margin: 0; }
    .search-box { text-align: center; margin-bottom: 30px; }
    input { padding: 12px; width: 350px; border-radius: 6px; border: 1px solid #1e293b; background: #16202c; color: #fff; outline: none; }
    input:focus { border-color: #facc15; }
    button { padding: 12px 24px; background: #facc15; color: #000; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; }
    button:hover { background: #eab308; }
    button:disabled { background: #475569; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; background: #0f1a2a; border-radius: 12px; overflow: hidden; margin-top: 20px; }
    th { background: #16202c; padding: 15px; text-align: left; color: #94a3b8; font-size: 0.8em; text-transform: uppercase; border-bottom: 2px solid #1e293b; cursor: pointer; }
    td { padding: 15px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
    .actual-value { font-size: 1.2em; font-weight: bold; color: #38bdf8; display: block; }
    .status-sub { font-size: 0.85em; font-weight: bold; margin-top: 4px; display: block; }
    .type-pill { padding: 3px 10px; border-radius: 20px; font-size: 0.75em; border: 1px solid #38bdf8; color: #38bdf8; white-space: nowrap; }
    .sentiment-positive { color: #4ade80; }
    .sentiment-negative { color: #f87171; }
    .sentiment-neutral { color: #94a3b8; }
    .no-data { text-align: center; padding: 40px; color: #94a3b8; font-style: italic; }
  </style>
</head>
<body onload="checkWatchlist()">

<div class="container">
  <header>
    <h1>STOCK DASHBOARD PRO ( Lynch Score )</h1>
    <p style="color: #94a3b8; font-size: 0.9em;">Fundamental Analysis Engine | Stable Endpoint System 2026</p>
  </header>

  <div class="search-box">
    <input id="symbol" placeholder="ชื่อหุ้น เช่น AAP, LRCX, CROX">
    <button id="btn-load" onclick="load()">วิเคราะห์ & ตรวจจับ 10X</button>
  </div>

  <table>
    <thead>
      <tr>
        <th onclick="sortTable('symbol')">หุ้น ↕</th>
        <th onclick="sortTable('price')">💰 ราคา ↕</th>
        <th onclick="sortTable('pe')">📈 P/E ↕</th>
        <th onclick="sortTable('eps')">📊 EPS ↕</th>
        <th onclick="sortTable('sentiment')">📰 ข่าว ↕</th>
        <th onclick="sortTable('lynchStatus')">⭐ LYNCH FIT ↕</th>
      </tr>
    </thead>
    <tbody id="result-body">
        <tr><td colspan="6" class="no-data">พิมพ์ชื่อหุ้นด้านบนแล้วกดปุ่มเพื่อเริ่มวิเคราะห์</td></tr>
    </tbody>
  </table>

  <div class="footer-legend" style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #1e293b; text-align: center; color: #94a3b8; font-size: 0.8em;">
    <p>ระบบใช้ข้อมูล Stable Endpoint จาก Financial Modeling Prep (FMP) รองรับบัญชีสมัครใหม่ปี 2026</p>
  </div>
</div>

<script>
let currentData = [];

function checkWatchlist() {
  const saved = localStorage.getItem('lynch_watchlist');
  if(saved) {
      document.getElementById('symbol').value = saved;
      load();
  }
}

async function load() {
  const s = document.getElementById("symbol").value;
  const btn = document.getElementById("btn-load");
  if(!s) return;

  btn.disabled = true;
  btn.innerText = "กำลังดึงข้อมูล...";
  localStorage.setItem('lynch_watchlist', s);

  try {
    const res = await fetch("/api/stocks?symbols=" + s);
    if (!res.ok) throw new Error("Server Error");
    
    const result = await res.json();
    
    // 💡 แก้ไขจุดสำคัญ: เข้าไปหยิบอาเรย์ stocks จากในกล่องที่เซิร์ฟเวอร์ส่งมา
    currentData = result.stocks || [];
    
    if (currentData.length === 0) {
        document.getElementById("result-body").innerHTML = `<tr><td colspan="6" class="no-data">ไม่พบข้อมูลหุ้น หรือ API จำกัดการเข้าถึง (เช็ค Logs ใน Vercel)</td></tr>`;
    } else {
        renderTable(currentData);
    }
  } catch (err) {
    console.error(err);
    document.getElementById("result-body").innerHTML = `<tr><td colspan="6" class="no-data" style="color:#f87171;">เกิดข้อผิดพลาดในการเชื่อมต่อ (ตรวจพบความไม่สอดคล้องของข้อมูล)</td></tr>`;
  } finally {
    btn.disabled = false;
    btn.innerText = "วิเคราะห์ & ตรวจจับ 10X";
  }
}

function renderTable(data) {
  let html = "";
  data.forEach(stock => {
    const sentimentClass = `sentiment-${stock.sentiment.toLowerCase()}`;
    
    html += `
      <tr>
        <td>
          <div style="font-weight:bold; font-size:1.1em;">${stock.symbol}</div>
          <div style="font-size:0.7em; color:#94a3b8;">${stock.name}</div>
        </td>
        <td style="font-weight:bold;">$${stock.price ? stock.price.toFixed(2) : '0.00'}</td>
        <td><span class="actual-value">${stock.pe}</span></td>
        <td><span class="actual-value">${stock.eps}</span></td>
        <td><span class="${sentimentClass}">● ${stock.sentiment}</span></td>
        <td>
          <div style="font-weight:bold; color:#facc15;">${stock.lynchStatus}</div>
          <div style="font-size:0.7em; color:#94a3b8;">${stock.timestamp}</div>
        </td>
      </tr>
    `;
  });
  document.getElementById("result-body").innerHTML = html;
}

function sortTable(p) {
  currentData.sort((a, b) => {
    let valA = a[p]; let valB = b[p];
    if (typeof valA === 'string') return valA.localeCompare(valB);
    return (valB || 0) - (valA || 0);
  });
  renderTable(currentData);
}
</script>
</body>
</html>
